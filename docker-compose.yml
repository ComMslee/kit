name: base

services:
  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: base-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kituser
      POSTGRES_PASSWORD: kitpassword
      POSTGRES_DB: kit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kituser -d kit_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Hono API 서버 ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: base-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://kituser:kitpassword@db:5432/kit_dev
      PORT: "4000"
    volumes:
      - ./apps/api/src:/workspace/apps/api/src
      - ./packages/db/prisma:/workspace/packages/db/prisma
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js 웹 앱 ─────────────────────────────────────────
  web:
    build:
      context: .                        # 모노레포 루트를 빌드 컨텍스트로
      dockerfile: apps/web/Dockerfile
    container_name: base-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env                 # OAuth 키, NEXTAUTH_SECRET 등
    environment:
      # apps/web/.env 의 DATABASE_URL 을 Docker 서비스명으로 덮어씀
      DATABASE_URL: postgresql://kituser:kitpassword@db:5432/kit_dev
    volumes:
      # 소스 변경 시 핫 리로드 (node_modules 는 컨테이너 것 유지)
      - ./apps/web/src:/workspace/apps/web/src
      - ./packages/db/prisma:/workspace/packages/db/prisma
      - ./apps/web/public:/workspace/apps/web/public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
